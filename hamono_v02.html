const canvas = document.getElementById('game');

function resize() {

// ── AUDIO ─────────────────────────────────────────────────────
let audioCtx = null;
let audioStarted = false;

function initAudio() {
  if (audioStarted) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioStarted = true;
}

function playSound(freq, type, duration, vol = 0.15) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function playNote(freq, type, duration, vol = 0.12, delay = 0) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = type;
    const t = audioCtx.currentTime + delay;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.start(t);
    osc.stop(t + duration);
  } catch(e) {}
}

const SFX = {
  step: () => playSound(120, 'sine', 0.04, 0.03),
  encounter: () => {
    // Rising pentatonic sting
    [261.6, 329.6, 392, 523.3].forEach((f, i) => playNote(f, 'triangle', 0.2, 0.1, i * 0.08));
  },
  forgeHit: () => {
    playSound(880, 'sawtooth', 0.06, 0.12);
    playSound(1200, 'sine', 0.1, 0.08);
  },
  forgeMiss: () => playSound(110, 'sawtooth', 0.25, 0.15),
  catch: () => {
    // Victory jingle — pentatonic ascending
    [523.3, 587.3, 659.3, 784, 1047].forEach((f, i) => playNote(f, 'triangle', 0.3, 0.12, i * 0.1));
  },
  flee: () => playSound(200, 'square', 0.15, 0.08),
  menuSelect: () => playSound(660, 'sine', 0.06, 0.08),
  menuMove: () => playSound(440, 'sine', 0.03, 0.05),
  knifeAppear: () => {
    // Metallic shimmer
    playNote(1200, 'sine', 0.4, 0.06, 0);
    playNote(1500, 'sine', 0.3, 0.05, 0.05);
    playNote(2000, 'sine', 0.2, 0.04, 0.1);
  },
};

// ── ENCOUNTER DRONE ───────────────────────────────────────────
let droneOsc = null;
let droneGain = null;

function startEncounterDrone() {
  if (!audioCtx) return;
  try {
    droneOsc = audioCtx.createOscillator();
    droneGain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400;
    droneOsc.connect(filter);
    filter.connect(droneGain);
    droneGain.connect(audioCtx.destination);
    droneOsc.type = 'sawtooth';
    droneOsc.frequency.value = 73.4; // D2
    droneGain.gain.value = 0;
    droneGain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 0.5);
    droneOsc.start();
  } catch(e) {}
}

function stopEncounterDrone() {
  if (!droneGain || !droneOsc) return;
  try {
    droneGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
    const osc = droneOsc;
    setTimeout(() => { try { osc.stop(); } catch(e) {} }, 400);
    droneOsc = null;
    droneGain = null;
  } catch(e) {}
}

function rollKnife() {
  const totalWeight = Object.values(RARITY).reduce((s, r) => s + r.weight, 0);
  let roll = Math.random() * totalWeight;
  let rarity = 'common';
  for (const [key, val] of Object.entries(RARITY)) {
    roll -= val.weight;
    if (roll <= 0) { rarity = key; break; }
  }
  const pool = KNIVES.filter(k => k.rarity === rarity);
  const knife = pool[Math.floor(Math.random() * pool.length)];
  // Add some variance to stats
  const stats = {};
  for (const [key, val] of Object.entries(knife.baseStats)) {
    stats[key] = Math.max(1, Math.min(100, val + Math.floor((Math.random() - 0.5) * 10)));
  }
  return { ...knife, stats, id: Date.now() + Math.random() };
}

// ── GAME STATE ────────────────────────────────────────────────

let time = 0;

// Player

const player = {
  x: 5, y: 8, // tile coords
  px: 5 * TILE, py: 8 * TILE, // pixel position (for smooth movement)
  targetX: 5, targetY: 8,

};

// Collection

// Encounter state

let encounterTransitionTimer = 0;
let encounterPhase = ''; // 'flash_in', 'knife_appear', 'menu'
let encounterTimer = 0;
let encounterMenuIndex = 0; // 0=forge, 1=flee
let knifeAppearProgress = 0;
let knifeParticles = [];

// Forge state

let forgeResult = ''; // 'success', 'fail'
let forgeResultTimer = 0;
let forgeSparkParticles = [];

// Catch result state
let catchResultTimer = 0;

// Collection view
let collectionScroll = 0;
let collectionSelected = 0;

// Screen effects

let screenShake = 0;

// Input
const keys = {};
let keyJustPressed = {};

window.addEventListener('keydown', e => {
  e.preventDefault();
  initAudio();
  if (!keys[e.code]) keyJustPressed[e.code] = true;
  keys[e.code] = true;
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function justPressed(code) { return keyJustPressed[code]; }
function clearFrameInputs() { keyJustPressed = {}; }

const map = [

function isPassable(tx, ty) {
  if (tx < 0 || ty < 0 || tx >= MAP_W || ty >= MAP_H) return false;
  const t = map[ty][tx];
  return t !== 2 && t !== 7 && t !== 8;
}

function isEncounterTile(tx, ty) {
  return map[ty]?.[tx] === 5;
}

// ── PARTICLES ─────────────────────────────────────────────────
let particles = [];

function spawnParticle(x, y, vx, vy, color, life = 1, size = 2) {
  particles.push({ x, y, vx, vy, color, life, maxLife: life, size });
}

function updateParticles(dt) {
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 40 * dt; // gravity
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ── UPDATE: PLAYER ────────────────────────────────────────────
function updatePlayer(dt) {
  player.animTimer += dt;
  if (player.animTimer > 0.2) {
    player.animTimer = 0;
    player.animFrame = (player.animFrame + 1) % 4;
  }

  if (player.moving) {
    player.moveTimer += dt;
    const t = Math.min(player.moveTimer / MOVE_DURATION, 1);
    const ease = t * t * (3 - 2 * t); // smoothstep
    player.px = (player.x + (player.targetX - player.x) * ease) * TILE;
    player.py = (player.y + (player.targetY - player.y) * ease) * TILE;

    if (t >= 1) {
      player.x = player.targetX;
      player.y = player.targetY;
      player.px = player.x * TILE;
      player.py = player.y * TILE;
      player.moving = false;
      player.stepCount++;

      // Check encounter
      if (isEncounterTile(player.x, player.y)) {
        if (Math.random() < 0.15) {
          triggerEncounter();
          return;
        }
      }
    }
    return;
  }

  // Process input
  let dx = 0, dy = 0;
  if (keys['ArrowUp'] || keys['KeyW']) { dy = -1; player.dir = 3; }
  else if (keys['ArrowDown'] || keys['KeyS']) { dy = 1; player.dir = 0; }
  else if (keys['ArrowLeft'] || keys['KeyA']) { dx = -1; player.dir = 1; }
  else if (keys['ArrowRight'] || keys['KeyD']) { dx = 1; player.dir = 2; }

  if ((dx !== 0 || dy !== 0) && isPassable(player.x + dx, player.y + dy)) {
    player.targetX = player.x + dx;
    player.targetY = player.y + dy;
    player.moving = true;
    player.moveTimer = 0;
    SFX.step();
  }
}

// ── ENCOUNTER TRIGGER ─────────────────────────────────────────
function triggerEncounter() {
  currentKnife = rollKnife();
  gameState = 'encounter_transition';
  encounterTransitionTimer = 0;
  screenFlash = 1;
  SFX.encounter();
  startEncounterDrone();
}

function enterEncounterScreen() {
  gameState = 'encounter';
  encounterPhase = 'knife_appear';
  encounterTimer = 0;
  knifeAppearProgress = 0;
  encounterMenuIndex = 0;
  knifeParticles = [];
  // Spawn shimmer particles
  for (let i = 0; i < 20; i++) {
    knifeParticles.push({
      x: 400 + (Math.random() - 0.5) * 100,
      y: 220 + (Math.random() - 0.5) * 80,
      vx: (Math.random() - 0.5) * 40,
      vy: -20 - Math.random() * 30,
      life: 0.5 + Math.random() * 1,
      maxLife: 1.5,
      size: 1 + Math.random() * 2,
    });
  }
}

// ── UPDATE: ENCOUNTER TRANSITION ──────────────────────────────
function updateEncounterTransition(dt) {
  encounterTransitionTimer += dt;
  if (encounterTransitionTimer > 0.6) {
    enterEncounterScreen();
  }
}

// ── UPDATE: ENCOUNTER SCREEN ──────────────────────────────────
function updateEncounter(dt) {
  encounterTimer += dt;

  // Update knife particles
  for (const p of knifeParticles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
  }
  knifeParticles = knifeParticles.filter(p => p.life > 0);

  if (encounterPhase === 'knife_appear') {
    knifeAppearProgress = Math.min(1, encounterTimer / 1.2);
    if (encounterTimer > 0.3 && encounterTimer < 0.35) SFX.knifeAppear();
    if (knifeAppearProgress >= 1) {
      encounterPhase = 'menu';
      encounterTimer = 0;
    }
  } else if (encounterPhase === 'menu') {
    if (justPressed('ArrowUp') || justPressed('KeyW') || justPressed('ArrowDown') || justPressed('KeyS')) {
      encounterMenuIndex = encounterMenuIndex === 0 ? 1 : 0;
      SFX.menuMove();
    }
    if (justPressed('Space') || justPressed('Enter')) {
      SFX.menuSelect();
      if (encounterMenuIndex === 0) {
        // Forge!
        startForge();
      } else {
        // Flee
        SFX.flee();
        exitEncounter();
      }
    }
  }
}

// ── FORGE MINI-GAME ───────────────────────────────────────────
function startForge() {
  gameState = 'forge';
  const rarityData = RARITY[currentKnife.rarity];
  forgeBar = {
    pos: 0,
    speed: 1.8 + (1 - rarityData.sweetSpot) * 2, // faster for rarer knives
    dir: 1,
    sweetCenter: 0.3 + Math.random() * 0.4, // random sweet spot position
    sweetSize: rarityData.sweetSpot,
    attempts: 0,
    maxAttempts: 3,
    phase: 'swinging', // swinging, strike, result
    strikeTimer: 0,
  };
  forgeSparkParticles = [];
}

function updateForge(dt) {
  // Spawn ambient forge sparks
  if (Math.random() < 0.3) {
    forgeSparkParticles.push({
      x: 400 + (Math.random() - 0.5) * 40,
      y: 350,
      vx: (Math.random() - 0.5) * 80,
      vy: -60 - Math.random() * 80,
      life: 0.4 + Math.random() * 0.4,
      maxLife: 0.8,
      size: 1 + Math.random() * 2,
      color: Math.random() > 0.5 ? C.forgeFire : C.forgeGlow,
    });
  }

  for (const p of forgeSparkParticles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 100 * dt;
    p.life -= dt;
  }
  forgeSparkParticles = forgeSparkParticles.filter(p => p.life > 0);

  if (forgeBar.phase === 'swinging') {
    forgeBar.pos += forgeBar.speed * forgeBar.dir * dt;
    if (forgeBar.pos >= 1) { forgeBar.pos = 1; forgeBar.dir = -1; }
    if (forgeBar.pos <= 0) { forgeBar.pos = 0; forgeBar.dir = 1; }

    if (justPressed('Space') || justPressed('Enter')) {
      forgeBar.phase = 'strike';
      forgeBar.strikeTimer = 0;
      forgeBar.attempts++;

      const sweetStart = forgeBar.sweetCenter - forgeBar.sweetSize / 2;
      const sweetEnd = forgeBar.sweetCenter + forgeBar.sweetSize / 2;
      const hit = forgeBar.pos >= sweetStart && forgeBar.pos <= sweetEnd;

      if (hit) {
        forgeResult = 'success';
        SFX.forgeHit();
        screenShake = 0.15;
        // Burst of sparks
        for (let i = 0; i < 30; i++) {
          forgeSparkParticles.push({
            x: 400,
            y: 350,
            vx: (Math.random() - 0.5) * 200,
            vy: -100 - Math.random() * 120,
            life: 0.3 + Math.random() * 0.5,
            maxLife: 0.8,
            size: 2 + Math.random() * 3,
            color: [C.forgeFire, C.forgeGlow, '#fff'][Math.floor(Math.random() * 3)],
          });
        }
      } else {
        forgeResult = 'fail';
        SFX.forgeMiss();
        screenShake = 0.05;
      }
    }
  } else if (forgeBar.phase === 'strike') {
    forgeBar.strikeTimer += dt;
    if (forgeBar.strikeTimer > 0.8) {
      if (forgeResult === 'success') {
        // Caught!
        catchSuccess = true;
        collection.push(currentKnife);
        gameState = 'catch_result';
        catchResultTimer = 0;
        SFX.catch();
        screenFlash = 0.5;
      } else if (forgeBar.attempts >= forgeBar.maxAttempts) {
        // Failed all attempts
        catchSuccess = false;
        gameState = 'catch_result';
        catchResultTimer = 0;
      } else {
        // Try again
        forgeBar.phase = 'swinging';
        // Speed up slightly
        forgeBar.speed += 0.3;
        // Move sweet spot
        forgeBar.sweetCenter = 0.2 + Math.random() * 0.6;
      }
    }
  }
}

// ── CATCH RESULT ──────────────────────────────────────────────
function updateCatchResult(dt) {
  catchResultTimer += dt;
  if (catchResultTimer > 2.5 && (justPressed('Space') || justPressed('Enter'))) {
    exitEncounter();
  }
}

function exitEncounter() {
  stopEncounterDrone();
  gameState = 'playing';
  currentKnife = null;
  particles = [];
}

// ── COLLECTION VIEW ───────────────────────────────────────────
function updateCollection(dt) {
  if (justPressed('Escape') || justPressed('KeyC')) {
    gameState = 'playing';
    SFX.menuSelect();
    return;
  }
  if (collection.length === 0) return;

  if (justPressed('ArrowUp') || justPressed('KeyW')) {
    collectionSelected = Math.max(0, collectionSelected - 1);
    SFX.menuMove();
  }
  if (justPressed('ArrowDown') || justPressed('KeyS')) {
    collectionSelected = Math.min(collection.length - 1, collectionSelected + 1);
    SFX.menuMove();
  }
}

// ── DRAW: MAP ─────────────────────────────────────────────────
function drawMap() {
  const camX = player.px - canvas.width / 2 + TILE / 2;
  const camY = player.py - canvas.height / 2 + TILE / 2;

  // Background gradient
  const bgGrad = ctx.createRadialGradient(400, 300, 0, 400, 300, 500);
  bgGrad.addColorStop(0, '#12121a');
  bgGrad.addColorStop(1, '#08080c');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let ty = 0; ty < MAP_H; ty++) {
    for (let tx = 0; tx < MAP_W; tx++) {
      const sx = tx * TILE - camX;
      const sy = ty * TILE - camY;
      if (sx < -TILE || sy < -TILE || sx > canvas.width + TILE || sy > canvas.height + TILE) continue;

      const tile = map[ty][tx];
      switch (tile) {
        case 0: // Grass
          ctx.fillStyle = (tx + ty) % 2 === 0 ? C.grass : C.grassLight;
          ctx.fillRect(sx, sy, TILE, TILE);
          // Grass detail
          if ((tx * 7 + ty * 13) % 5 === 0) {
            ctx.fillStyle = '#3a6a3a';
            ctx.fillRect(sx + 8, sy + 12, 2, 6);
            ctx.fillRect(sx + 20, sy + 8, 2, 8);
          }
          break;
        case 1: // Path
          ctx.fillStyle = (tx + ty) % 2 === 0 ? C.path : C.pathLight;
          ctx.fillRect(sx, sy, TILE, TILE);
          if ((tx * 11 + ty * 7) % 8 === 0) {
            ctx.fillStyle = '#7a6a50';
            ctx.fillRect(sx + 5 + (tx % 3) * 8, sy + 4 + (ty % 3) * 7, 3, 2);
          }
          break;
        case 2: case 8: // Water
          ctx.fillStyle = tile === 8 ? '#0a2a4a' : ((tx + ty + Math.floor(time * 2)) % 2 === 0 ? C.water : C.waterLight);
          ctx.fillRect(sx, sy, TILE, TILE);
          // Wave shimmer
          const waveOff = Math.sin(time * 3 + tx * 0.5 + ty * 0.7) * 2;
          ctx.fillStyle = 'rgba(100,180,255,0.1)';
          ctx.fillRect(sx, sy + 14 + waveOff, TILE, 2);
          break;
        case 3: // Building wall
          ctx.fillStyle = (tx + ty) % 2 === 0 ? C.building : C.buildingLight;
          ctx.fillRect(sx, sy, TILE, TILE);
          ctx.strokeStyle = '#2a1a1a';
          ctx.strokeRect(sx + 0.5, sy + 0.5, TILE - 1, TILE - 1);
          break;
        case 7: // Roof
          ctx.fillStyle = C.roof;
          ctx.fillRect(sx, sy, TILE, TILE);
          ctx.fillStyle = '#5a1818';
          ctx.fillRect(sx, sy + TILE - 4, TILE, 4);
          break;
        case 4: // Forge
          ctx.fillStyle = C.forge;
          ctx.fillRect(sx, sy, TILE, TILE);
          // Animated embers
          if (Math.random() > 0.85) {
            spawnParticle(
              sx + 16 + (Math.random() - 0.5) * 20,
              sy + 10,
              (Math.random() - 0.5) * 15,
              -20 - Math.random() * 20,
              Math.random() > 0.5 ? C.forgeFire : C.forgeGlow,
              0.5 + Math.random() * 0.5,
              2
            );
          }
          // Glow
          const glowSize = 8 + Math.sin(time * 4) * 3;
          const grd = ctx.createRadialGradient(sx + 16, sy + 16, 0, sx + 16, sy + 16, TILE + glowSize);
          grd.addColorStop(0, 'rgba(255,102,34,0.15)');
          grd.addColorStop(1, 'rgba(255,102,34,0)');
          ctx.fillStyle = grd;
          ctx.fillRect(sx - glowSize, sy - glowSize, TILE + glowSize * 2, TILE + glowSize * 2);
          break;
        case 5: // Bamboo / encounter grass
          ctx.fillStyle = (tx + ty) % 2 === 0 ? C.bamboo : C.bambooLight;
          ctx.fillRect(sx, sy, TILE, TILE);
          // Bamboo stalks
          const seed = tx * 31 + ty * 17;
          for (let i = 0; i < 3; i++) {
            const bx = sx + 6 + ((seed + i * 11) % 20);
            const sway = Math.sin(time * 1.5 + tx + i) * 1.5;
            ctx.fillStyle = C.bambooStalk;
            ctx.fillRect(bx + sway, sy, 2, TILE);
            // Leaves
            ctx.fillStyle = '#5a9a4a';
            ctx.fillRect(bx + sway - 2, sy + 4 + (i * 8) % 16, 6, 2);
            ctx.fillRect(bx + sway + 1, sy + 10 + (i * 5) % 12, 5, 2);
          }
          // Subtle danger indicator — rustling effect
          if (Math.sin(time * 5 + tx * 3 + ty * 7) > 0.8) {
            ctx.fillStyle = 'rgba(100,200,80,0.08)';
            ctx.fillRect(sx, sy, TILE, TILE);
          }
          break;
      }
    }
  }
}

// ── DRAW: PLAYER ──────────────────────────────────────────────
function drawPlayer() {
  const camX = player.px - canvas.width / 2 + TILE / 2;
  const camY = player.py - canvas.height / 2 + TILE / 2;
  const sx = player.px - camX;
  const sy = player.py - camY;
  const bob = Math.sin(time * 8) * (player.moving ? 1.5 : 0);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(sx + 16, sy + 30, 8, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body (kimono)
  ctx.fillStyle = '#4a6a8a';
  ctx.fillRect(sx + 8, sy + 12 + bob, 16, 14);
  // Kimono belt (obi)
  ctx.fillStyle = C.uiBorder;
  ctx.fillRect(sx + 8, sy + 19 + bob, 16, 3);

  // Head
  ctx.fillStyle = '#e8d0b0';
  ctx.fillRect(sx + 10, sy + 4 + bob, 12, 10);
  // Hair
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(sx + 9, sy + 2 + bob, 14, 5);
  ctx.fillRect(sx + 9, sy + 4 + bob, 2, 4);
  ctx.fillRect(sx + 21, sy + 4 + bob, 2, 4);

  // Eyes (direction-based)
  ctx.fillStyle = '#1a1a2a';
  if (player.dir === 0) { // down
    ctx.fillRect(sx + 12, sy + 9 + bob, 2, 2);
    ctx.fillRect(sx + 18, sy + 9 + bob, 2, 2);
  } else if (player.dir === 3) { // up
    // No eyes visible from behind
  } else if (player.dir === 1) { // left
    ctx.fillRect(sx + 11, sy + 9 + bob, 2, 2);
    ctx.fillRect(sx + 16, sy + 9 + bob, 2, 2);
  } else { // right
    ctx.fillRect(sx + 14, sy + 9 + bob, 2, 2);
    ctx.fillRect(sx + 19, sy + 9 + bob, 2, 2);
  }

  // Legs
  const legAnim = player.moving ? Math.sin(time * 12) * 2 : 0;
  ctx.fillStyle = '#3a3a50';
  ctx.fillRect(sx + 10, sy + 26 + bob, 4, 5);
  ctx.fillRect(sx + 18, sy + 26 + bob + legAnim, 4, 5);

  // Knife on belt
  ctx.fillStyle = '#c0c0c8';
  ctx.fillRect(sx + 24, sy + 18 + bob, 2, 8);
  ctx.fillStyle = '#8a6a40';
  ctx.fillRect(sx + 24, sy + 22 + bob, 2, 4);
}

// ── DRAW: HUD ─────────────────────────────────────────────────
function drawHUD() {
  // Collection count
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(8, 8, 120, 28);

  if (isEncounterTile(player.x, player.y)) {
    const pulse = 0.5 + 0.3 * Math.sin(time * 4);
    ctx.fillStyle = `rgba(100,200,80,${pulse})`;
    ctx.font = '10px monospace';

// ── DRAW: ENCOUNTER TRANSITION ────────────────────────────────
function drawEncounterTransition() {
  drawMap();
  drawPlayer();

  const t = encounterTransitionTimer / 0.6;

  // Horizontal wipe bars (Japanese screen transition feel)
  const numBars = 12;
  for (let i = 0; i < numBars; i++) {
    const barH = canvas.height / numBars;
    const delay = i * 0.04;
    const barT = Math.max(0, Math.min(1, (t - delay) * 2));
    const ease = barT * barT;
    const dir = i % 2 === 0 ? 1 : -1;
    ctx.fillStyle = '#0a0a0f';
    if (dir === 1) {
      ctx.fillRect(0, i * barH, canvas.width * ease, barH + 1);
    } else {
      ctx.fillRect(canvas.width * (1 - ease), i * barH, canvas.width * ease, barH + 1);
    }
  }
}

// ── DRAW: KNIFE PIXEL ART ─────────────────────────────────────
function drawKnifeArt(cx, cy, knife, scale = 3) {
  const rarityColor = RARITY[knife.rarity].color;

  // Glow behind knife
  const glowR = 60 + Math.sin(time * 2) * 10;
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
  grd.addColorStop(0, rarityColor + '40');
  grd.addColorStop(1, rarityColor + '00');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
  ctx.fill();

  // Knife body (blade)
  const bladeLen = 40 * scale / 3;
  const bladeW = 8 * scale / 3;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-0.3);

  // Blade
  ctx.fillStyle = '#d0d4d8';
  ctx.beginPath();
  ctx.moveTo(-bladeLen, -bladeW / 4);
  ctx.lineTo(-bladeLen + 5, -bladeW / 2);
  ctx.lineTo(bladeLen * 0.3, -bladeW / 2);
  ctx.lineTo(bladeLen * 0.5, 0);
  ctx.lineTo(bladeLen * 0.3, bladeW / 3);
  ctx.lineTo(-bladeLen, bladeW / 4);
  ctx.closePath();
  ctx.fill();

  // Edge
  ctx.strokeStyle = '#f0f4f8';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-bladeLen, -bladeW / 4);
  ctx.lineTo(-bladeLen + 5, -bladeW / 2);
  ctx.lineTo(bladeLen * 0.3, -bladeW / 2);
  ctx.lineTo(bladeLen * 0.5, 0);
  ctx.stroke();

  // Shinogi line
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.moveTo(-bladeLen + 8, -bladeW / 6);
  ctx.lineTo(bladeLen * 0.25, -bladeW / 6);
  ctx.stroke();

  // Handle (wa-handle)
  ctx.fillStyle = '#5a3a1a';
  ctx.fillRect(bladeLen * 0.3 - 2, -bladeW / 3, bladeLen * 0.5, bladeW * 0.65);
  // Ferrule
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(bladeLen * 0.28, -bladeW / 3, 4, bladeW * 0.65);
  // End cap
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(bladeLen * 0.75, -bladeW / 3, 3, bladeW * 0.65);

  ctx.restore();
}

// ── DRAW: ENCOUNTER SCREEN ────────────────────────────────────
function drawEncounter() {
  // Dark background
  const bgGrad = ctx.createRadialGradient(400, 250, 0, 400, 300, 400);
  bgGrad.addColorStop(0, '#14141f');
  bgGrad.addColorStop(1, '#08080c');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Decorative border
  ctx.strokeStyle = C.uiBorder + '40';
  ctx.lineWidth = 2;
  ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);
  // Corner accents
  const corners = [[24, 24], [canvas.width - 28, 24], [24, canvas.height - 28], [canvas.width - 28, canvas.height - 28]];
  for (const [cx, cy] of corners) {
    ctx.fillStyle = C.uiBorder;
    ctx.fillRect(cx, cy, 4, 4);
  }

  if (!currentKnife) return;
  const rarityData = RARITY[currentKnife.rarity];

  // Knife appearance animation
  const knifeAlpha = Math.min(1, knifeAppearProgress * 2);
  const knifeScale = 0.5 + knifeAppearProgress * 0.5;

  ctx.globalAlpha = knifeAlpha;
  drawKnifeArt(400, 200, currentKnife, 3 * knifeScale);
  ctx.globalAlpha = 1;

  // Knife particles
  for (const p of knifeParticles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = rarityData.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  if (knifeAppearProgress < 0.5) return;

  const textAlpha = Math.min(1, (knifeAppearProgress - 0.5) * 4);
  ctx.globalAlpha = textAlpha;

  // Knife name + kanji
  ctx.textAlign = 'center';
  ctx.shadowColor = rarityData.color;
  ctx.shadowBlur = 16;
  ctx.fillStyle = C.text;
  ctx.font = 'bold 28px monospace';
  ctx.fillText(currentKnife.name, 400, 290);
  ctx.shadowBlur = 0;

  ctx.fillStyle = rarityData.color;
  ctx.font = '18px monospace';
  ctx.fillText(currentKnife.kanji, 400, 315);

  // Rarity + type
  ctx.font = '12px monospace';
  ctx.fillText(`${rarityData.name} · ${currentKnife.type}`, 400, 340);

  // Description
  ctx.fillStyle = C.textDim;
  ctx.font = '11px monospace';
  ctx.fillText(currentKnife.desc, 400, 365);

  // Stats
  const statNames = { sharp: 'Sharpness', edge: 'Edge Ret.', weight: 'Weight', balance: 'Balance' };
  const statY = 395;
  let si = 0;
  for (const [key, label] of Object.entries(statNames)) {
    const val = currentKnife.stats[key];
    const bx = 220 + si * 90;

    ctx.fillStyle = C.textDim;
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(label, bx + 30, statY);

    // Bar bg
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(bx, statY + 5, 60, 6);
    // Bar fill
    const barColor = val > 85 ? rarityData.color : val > 65 ? '#80a080' : '#808080';
    ctx.fillStyle = barColor;
    ctx.fillRect(bx, statY + 5, 60 * (val / 100), 6);
    // Value
    ctx.fillStyle = C.text;
    ctx.font = '9px monospace';
    ctx.fillText(val, bx + 30, statY + 22);
    si++;
  }

  ctx.globalAlpha = 1;

  // Menu
  if (encounterPhase === 'menu') {
    const menuY = 460;
    const options = ['⚒ Forge', '↩ Flee'];
    for (let i = 0; i < options.length; i++) {
      const selected = i === encounterMenuIndex;
      const ox = 320 + i * 100;

      if (selected) {
        ctx.fillStyle = 'rgba(200,160,80,0.15)';
        ctx.fillRect(ox - 5, menuY - 14, 90, 24);
        ctx.strokeStyle = C.uiBorder;
        ctx.strokeRect(ox - 5, menuY - 14, 90, 24);
      }

      ctx.fillStyle = selected ? C.uiBorder : C.textDim;
      ctx.font = selected ? 'bold 14px monospace' : '13px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(options[i], ox + 40, menuY + 2);
    }

    // Hint
    ctx.fillStyle = C.textDim;
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('↑↓ Select · SPACE Confirm', 400, 505);
  }
}

// ── DRAW: FORGE MINI-GAME ─────────────────────────────────────
function drawForge() {
  // Background
  const bgGrad = ctx.createRadialGradient(400, 350, 0, 400, 350, 400);
  bgGrad.addColorStop(0, '#1a100a');
  bgGrad.addColorStop(1, '#0a0806');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Forge ambient glow
  const glowPulse = 0.6 + 0.2 * Math.sin(time * 3);
  const grd = ctx.createRadialGradient(400, 380, 0, 400, 380, 200);
  grd.addColorStop(0, `rgba(255,100,20,${glowPulse * 0.15})`);
  grd.addColorStop(1, 'rgba(255,100,20,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(200, 200, 400, 300);

  // Sparks
  for (const p of forgeSparkParticles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = C.forgeGlow;
  ctx.shadowColor = C.forgeFire;
  ctx.shadowBlur = 12;
  ctx.font = 'bold 24px monospace';
  ctx.fillText('FORGE', 400, 60);
  ctx.shadowBlur = 0;

  // Knife name
  if (currentKnife) {
    const rc = RARITY[currentKnife.rarity].color;
    ctx.fillStyle = rc;
    ctx.font = '16px monospace';
    ctx.fillText(`${currentKnife.name} ${currentKnife.kanji}`, 400, 90);
  }

  // Attempts remaining
  ctx.fillStyle = C.text;
  ctx.font = '12px monospace';
  const attemptsLeft = forgeBar.maxAttempts - forgeBar.attempts;
  ctx.fillText(`Strikes: ${'🔨'.repeat(attemptsLeft)}${'·'.repeat(forgeBar.attempts)}`, 400, 120);

  // Timing bar
  const barX = 150, barY = 200, barW = 500, barH = 40;

  // Bar background
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.strokeStyle = C.uiBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(barX, barY, barW, barH);

  // Sweet spot
  const sweetStart = forgeBar.sweetCenter - forgeBar.sweetSize / 2;
  const sweetEnd = forgeBar.sweetCenter + forgeBar.sweetSize / 2;
  const sweetGlow = 0.3 + 0.15 * Math.sin(time * 6);
  ctx.fillStyle = `rgba(255,136,68,${sweetGlow})`;
  ctx.fillRect(barX + sweetStart * barW, barY, (sweetEnd - sweetStart) * barW, barH);
  ctx.strokeStyle = C.forgeGlow;
  ctx.lineWidth = 1;
  ctx.strokeRect(barX + sweetStart * barW, barY, (sweetEnd - sweetStart) * barW, barH);

  // Indicator
  if (forgeBar.phase === 'swinging') {
    const indX = barX + forgeBar.pos * barW;
    ctx.fillStyle = '#fff';
    ctx.fillRect(indX - 2, barY - 4, 4, barH + 8);
    // Glow on indicator
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 8;
    ctx.fillRect(indX - 1, barY, 2, barH);
    ctx.shadowBlur = 0;
  } else if (forgeBar.phase === 'strike') {
    // Flash on strike position
    const indX = barX + forgeBar.pos * barW;
    const flashAlpha = Math.max(0, 1 - forgeBar.strikeTimer * 3);
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = forgeResult === 'success' ? '#ffcc44' : '#ff4444';
    ctx.fillRect(indX - 10, barY - 8, 20, barH + 16);
    ctx.globalAlpha = 1;

    // Result text
    if (forgeBar.strikeTimer > 0.2) {
      ctx.font = 'bold 32px monospace';
      if (forgeResult === 'success') {
        ctx.fillStyle = C.forgeGlow;
        ctx.shadowColor = C.forgeFire;
        ctx.shadowBlur = 16;
        ctx.fillText('PERFECT STRIKE!', 400, 300);
      } else {
        ctx.fillStyle = '#aa4444';
        ctx.fillText('MISS...', 400, 300);
      }
      ctx.shadowBlur = 0;
    }
  }

  // Instructions
  ctx.fillStyle = C.textDim;
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  if (forgeBar.phase === 'swinging') {
    ctx.fillText('Hit SPACE when the marker enters the forge zone!', 400, 270);
  }

  // Decorative anvil area
  ctx.fillStyle = '#2a2a30';
  ctx.fillRect(360, 340, 80, 20);
  ctx.fillRect(370, 330, 60, 12);
  ctx.fillStyle = '#3a3a42';
  ctx.fillRect(372, 332, 56, 8);
}

// ── DRAW: CATCH RESULT ────────────────────────────────────────
function drawCatchResult() {
  // Dark overlay
  ctx.fillStyle = 'rgba(8,8,12,0.9)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = 'center';

  if (catchSuccess) {
    // Success!
    const bounce = Math.max(0, Math.sin(catchResultTimer * 3) * Math.max(0, 1 - catchResultTimer * 0.5) * 10);

    drawKnifeArt(400, 200 - bounce, currentKnife, 3.5);

    const rarityData = RARITY[currentKnife.rarity];

    ctx.shadowColor = rarityData.color;
    ctx.shadowBlur = 20 + Math.sin(time * 3) * 8;
    ctx.fillStyle = C.text;
    ctx.font = 'bold 26px monospace';
    ctx.fillText(`${currentKnife.name} Forged!`, 400, 310);
    ctx.shadowBlur = 0;

    ctx.fillStyle = rarityData.color;
    ctx.font = '16px monospace';
    ctx.fillText(currentKnife.kanji, 400, 340);

    ctx.fillStyle = rarityData.color;
    ctx.font = '13px monospace';
    ctx.fillText(`Added to collection (${collection.length} total)`, 400, 375);
  } else {
    ctx.fillStyle = '#aa6644';
    ctx.font = 'bold 22px monospace';
    ctx.fillText('The blade shattered...', 400, 260);

    ctx.fillStyle = C.textDim;
    ctx.font = '13px monospace';
    ctx.fillText(`${currentKnife.name} escaped the forge.`, 400, 300);
  }

  if (catchResultTimer > 2.5) {
    const blink = Math.floor(time * 2) % 2;
    if (blink) {
      ctx.fillStyle = C.textDim;
      ctx.font = '11px monospace';
      ctx.fillText('Press SPACE to continue', 400, 450);
    }
  }
}

// ── DRAW: COLLECTION ──────────────────────────────────────────
function drawCollection() {
  // Background
  ctx.fillStyle = '#0c0c14';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Border
  ctx.strokeStyle = C.uiBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = C.uiBorder;
  ctx.shadowColor = C.uiGlow;
  ctx.shadowBlur = 12;
  ctx.font = 'bold 22px monospace';
  ctx.fillText('刃物 Collection', 400, 55);
  ctx.shadowBlur = 0;

  ctx.fillStyle = C.textDim;
  ctx.font = '11px monospace';
  ctx.fillText(`${collection.length} / ${KNIVES.length} types discovered`, 400, 75);

  if (collection.length === 0) {
    ctx.fillStyle = C.textDim;
    ctx.font = '13px monospace';
    ctx.fillText('No knives yet. Walk through the bamboo groves!', 400, 300);
  } else {
    // List
    const listX = 40, listY = 100, listW = 300, itemH = 32;
    const maxVisible = 14;
    const scrollOffset = Math.max(0, collectionSelected - maxVisible + 3);

    for (let i = scrollOffset; i < Math.min(collection.length, scrollOffset + maxVisible); i++) {
      const k = collection[i];
      const iy = listY + (i - scrollOffset) * itemH;
      const selected = i === collectionSelected;
      const rarityData = RARITY[k.rarity];

      if (selected) {
        ctx.fillStyle = 'rgba(200,160,80,0.1)';
        ctx.fillRect(listX, iy, listW, itemH - 2);
        ctx.strokeStyle = C.uiBorder + '60';
        ctx.strokeRect(listX, iy, listW, itemH - 2);
      }

      // Rarity dot
      ctx.fillStyle = rarityData.color;
      ctx.beginPath();
      ctx.arc(listX + 12, iy + 14, 4, 0, Math.PI * 2);
      ctx.fill();

      // Name
      ctx.fillStyle = selected ? C.text : C.textDim;
      ctx.font = selected ? 'bold 12px monospace' : '12px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`${k.name} ${k.kanji}`, listX + 24, iy + 18);

      // Rarity
      ctx.fillStyle = rarityData.color;
      ctx.font = '9px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(rarityData.name, listX + listW - 8, iy + 18);
    }

    // Detail panel for selected
    if (collection[collectionSelected]) {
      const k = collection[collectionSelected];
      const rarityData = RARITY[k.rarity];
      const panelX = 380, panelY = 100, panelW = 380, panelH = 360;

      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(panelX, panelY, panelW, panelH);
      ctx.strokeStyle = C.uiBorder + '30';
      ctx.strokeRect(panelX, panelY, panelW, panelH);

      // Knife art
      drawKnifeArt(panelX + panelW / 2, panelY + 80, k, 2.5);

      // Info
      ctx.textAlign = 'center';
      const cx = panelX + panelW / 2;

      ctx.fillStyle = C.text;
      ctx.font = 'bold 18px monospace';
      ctx.fillText(k.name, cx, panelY + 150);

      ctx.fillStyle = rarityData.color;
      ctx.font = '14px monospace';
      ctx.fillText(k.kanji, cx, panelY + 172);

      ctx.font = '10px monospace';
      ctx.fillText(`${rarityData.name} · ${k.type}`, cx, panelY + 192);

      ctx.fillStyle = C.textDim;
      ctx.font = '10px monospace';
      ctx.fillText(k.desc, cx, panelY + 218);

      // Stats bars
      const statNames = { sharp: 'Sharpness', edge: 'Edge Ret.', weight: 'Weight', balance: 'Balance' };
      let sIdx = 0;
      for (const [key, label] of Object.entries(statNames)) {
        const val = k.stats[key];
        const sy = panelY + 245 + sIdx * 26;

        ctx.textAlign = 'left';
        ctx.fillStyle = C.textDim;
        ctx.font = '10px monospace';
        ctx.fillText(label, panelX + 40, sy + 4);

        // Bar
        const bx = panelX + 140, bw = 160;
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(bx, sy - 4, bw, 10);
        const barColor = val > 85 ? rarityData.color : val > 65 ? '#80a080' : '#707070';
        ctx.fillStyle = barColor;
        ctx.fillRect(bx, sy - 4, bw * (val / 100), 10);

        ctx.textAlign = 'right';
        ctx.fillStyle = C.text;
        ctx.font = '10px monospace';
        ctx.fillText(val, panelX + panelW - 40, sy + 4);
        sIdx++;
      }
    }
  }

  // Controls
  ctx.fillStyle = C.textDim;
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('↑↓ Navigate · C / ESC Close', 400, canvas.height - 32);
}

// ── DRAW: TITLE SCREEN ────────────────────────────────────────
function drawTitle() {
  ctx.fillStyle = 'rgba(10,10,15,0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = 'center';
  const cy = canvas.height / 2;

  // Decorative frame
  ctx.strokeStyle = C.uiBorder + '60';
  ctx.lineWidth = 1;
  [[canvas.width/2-82, cy-50], [canvas.width/2+82, cy-50], [canvas.width/2-82, cy+46], [canvas.width/2+82, cy+46]].forEach(([x,y]) => {
    ctx.fillStyle = C.uiBorder;
    ctx.fillRect(x-3, y-3, 6, 6);
  });

  ctx.shadowColor = C.forgeGlow;
  ctx.shadowBlur = 24 + 8 * Math.sin(time * 1.8);
  ctx.fillStyle = C.text;
  ctx.font = 'bold 56px monospace';
  ctx.fillText('HAMONO', canvas.width/2, cy + 8);
  ctx.shadowBlur = 0;

  ctx.fillStyle = C.uiBorder;
  ctx.font = '12px monospace';
  ctx.fillText('刃物  ·  THE BLADE COLLECTOR', canvas.width/2, cy + 30);

  ctx.fillStyle = C.textDim;
  ctx.font = '10px monospace';
  ctx.fillText('Explore. Discover. Forge legendary Japanese knives.', canvas.width/2, cy + 68);

  if (Math.floor(time * 2) % 2 === 0) {
    ctx.fillStyle = C.text;
    ctx.font = '11px monospace';
    ctx.fillText('▶  PRESS ANY KEY TO BEGIN  ◀', canvas.width/2, cy + 100);
  }

  ctx.fillStyle = C.textDim;
  ctx.font = '8px monospace';
  ctx.fillText('v0.2  ·  WASD / Arrows = Move  ·  C = Collection', canvas.width/2, canvas.height - 12);
}

// ── SCREEN EFFECTS ────────────────────────────────────────────
function applyScreenEffects(dt) {
  // Screen flash
  if (screenFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${screenFlash})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    screenFlash -= dt * 3;
  }

  // Screen shake
  if (screenShake > 0) {
    const shakeX = (Math.random() - 0.5) * screenShake * 30;
    const shakeY = (Math.random() - 0.5) * screenShake * 30;
    ctx.translate(shakeX, shakeY);
    screenShake -= dt * 2;
    if (screenShake < 0) screenShake = 0;
  }
}

// ── MAIN GAME LOOP ────────────────────────────────────────────
let lastTime = 0;

function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  time += dt;

  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Screen shake offset (applied before world rendering)
  if (screenShake > 0) {
    const sx = (Math.random() - 0.5) * screenShake * 30;
    const sy = (Math.random() - 0.5) * screenShake * 30;
    ctx.translate(sx, sy);
    screenShake = Math.max(0, screenShake - dt * 2);
  }

  switch (gameState) {
    case 'title':
      drawMap();
      drawTitle();
      if (Object.values(keys).some(Boolean)) {
        gameState = 'playing';
      }
      break;

    case 'playing':
      updatePlayer(dt);
      updateParticles(dt);
      drawMap();
      drawParticles();
      drawPlayer();
      drawHUD();
      // Open collection
      if (justPressed('KeyC')) {
        gameState = 'collection';
        collectionSelected = 0;
        SFX.menuSelect();
      }
      break;

    case 'encounter_transition':
      updateEncounterTransition(dt);
      drawEncounterTransition();
      break;

    case 'encounter':
      updateEncounter(dt);
      drawEncounter();
      break;

    case 'forge':
      updateForge(dt);
      drawForge();
      break;

    case 'catch_result':
      updateCatchResult(dt);
      drawCatchResult();
      break;

    case 'collection':
      updateCollection(dt);
      drawCollection();
      break;
  }

  // Screen flash (on top of everything)
  if (screenFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${Math.min(1, screenFlash)})`;
    ctx.fillRect(-20, -20, canvas.width + 40, canvas.height + 40);
    screenFlash -= dt * 3;
  }

  ctx.restore();
  clearFrameInputs();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

  </script>
